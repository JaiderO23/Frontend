<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado con degradado vibrante -->
  <rect x="10" y="10" width="180" height="180" rx="36" fill="url(#bgGrad)"/>
  
  <!-- Brillos decorativos en el fondo -->
  <circle cx="160" cy="40" r="8" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="40" cy="160" r="6" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="170" cy="155" r="4" fill="#FACC15" opacity="0.5"/>
  <circle cx="35" cy="55" r="3" fill="#FACC15" opacity="0.6"/>
  
  <!-- ====== CARRITO DE COMPRAS ====== -->
  
  <!-- Mango del carrito -->
  <path d="M 40 60 L 55 60 L 65 75" 
        stroke="#1E293B" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cuerpo del carrito (canasta con borde) -->
  <path d="M 60 75 L 155 75 L 145 130 L 75 130 Z" 
        fill="url(#cartGrad)" stroke="#1E293B" stroke-width="5" stroke-linejoin="round"/>
  
  <!-- Líneas verticales de la canasta -->
  <g stroke="#1E293B" stroke-width="3" stroke-linecap="round">
    <line x1="80" y1="85" x2="78" y2="125"/>
    <line x1="100" y1="85" x2="99" y2="125"/>
    <line x1="120" y1="85" x2="121" y2="125"/>
    <line x1="140" y1="85" x2="142" y2="125"/>
  </g>
  
  <!-- Línea horizontal superior decorativa -->
  <line x1="65" y1="90" x2="153" y2="90" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
  
  <!-- ====== PRODUCTOS DENTRO DEL CARRITO ====== -->
  
  <!-- Manzana roja (sobresale) -->
  <circle cx="85" cy="68" r="13" fill="#EF4444" stroke="#1E293B" stroke-width="3"/>
  <ellipse cx="81" cy="64" rx="3" ry="4" fill="#FCA5A5" opacity="0.8"/>
  <path d="M 85 56 Q 88 51 92 53" stroke="#15803D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="93" cy="52" rx="4" ry="2" fill="#22C55E" stroke="#15803D" stroke-width="1.5" transform="rotate(20 93 52)"/>
  
  <!-- Botella amarilla (sobresale) -->
  <rect x="105" y="55" width="14" height="28" rx="2" fill="#FACC15" stroke="#1E293B" stroke-width="3"/>
  <rect x="108" y="50" width="8" height="7" fill="#1E293B"/>
  <rect x="107" y="65" width="10" height="3" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Caja morada (sobresale) -->
  <rect x="128" y="58" width="22" height="22" fill="#A855F7" stroke="#1E293B" stroke-width="3"/>
  <rect x="128" y="64" width="22" height="3" fill="#FCD34D"/>
  <circle cx="139" cy="73" r="2.5" fill="#FFFFFF"/>
  
  <!-- ====== RUEDAS ====== -->
  
  <!-- Rueda izquierda -->
  <circle cx="85" cy="148" r="11" fill="#1E293B"/>
  <circle cx="85" cy="148" r="5" fill="#94A3B8"/>
  <circle cx="85" cy="148" r="2" fill="#1E293B"/>
  
  <!-- Rueda derecha -->
  <circle cx="135" cy="148" r="11" fill="#1E293B"/>
  <circle cx="135" cy="148" r="5" fill="#94A3B8"/>
  <circle cx="135" cy="148" r="2" fill="#1E293B"/>
  
  <!-- ====== BRILLOS / DETALLES ====== -->
  
  <!-- Estrellitas decorativas -->
  <g fill="#FACC15">
    <polygon points="170,90 172,95 177,95 173,98 175,103 170,100 165,103 167,98 163,95 168,95" 
             transform="scale(0.6) translate(110, 60)"/>
  </g>
  
  <!-- Línea de movimiento (efecto de carrito en marcha) -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="22" y1="100" x2="32" y2="100"/>
    <line x1="22" y1="115" x2="36" y2="115"/>
    <line x1="22" y1="130" x2="30" y2="130"/>
  </g>
</svg>
